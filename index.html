<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiProductivity</title>

    <script src="scripts.js" defer></script>
</head>
<body>
    <h1>MultiProductivity</h1>
    <h2>Sign up</h2>
    <form id="form_register">

        <label for="name_register">Name:</label>
        <input type="text" id="name_register", name="name" required> <br><br>

        <label for="username_register">Username:</label>
        <input type="text" id="username_register" name="username" required> <br><br>

        <label for="password_register">Password:</label>
        <input type="text" id="password_register" name="password" required> <br><br>

        <button type="submit">Register</button> <br><br>
    </form>

    <h2>Log in</h2>
    <form id="form_login">
        
        <label for="username_login">Username:</label>
        <input type="text" id="username_login" name="username" required> <br><br>

        <label for="password_login">Password:</label>
        <input type="text" id="password_login" name="password" required> <br><br>

        <button type="submit">Login</button>
    </form>
</body>
</html>
