<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiProductivity</title>
</head>
<body>
    <h1>MultiProductivity</h1>
    <h2>Create task</h2>
    <!--Create task-->
    <form id="form_create_task">
        <label for="create_title">Title:</label>
        <input type="text" id="create_title" name="create_title" placeholder="New Task">
        <br><br>

        <label for="create_info">Info:</label>
        <input type="text" id="create_info" name="create_info" placeholder="Estudy math">
        <br><br>

        <button type="submit">Create task</button>
    </form>

    <h2>View tasks</h2>
    <!--View tasks with a button-->
    <form id="form_view_tasks">
        <button type="submit">View tasks</button>
    </form>

    <!--Container-tasks-->
    <ul id="tasks-list"></ul>

    <h2>Edit task</h2>
    <!--Form edit tasks-->
    <form id="form_edit_task">
        <label for="task_id_edit">Task ID:</label>
        <input type="number" id="task_id_edit" name="task_id_edit" placeholder="1" required>
        <br><br>

        <label for="title_edit">New title:</label>
        <input type="text" id="title_edit" name="title_edit" placeholder="Title Task">
        <br><br>

        <label for="info_edit">New info:</label>
        <input type="text" id="info_edit" name="info_edit" placeholder="Estudy math">
        <br><br>

        <label for="status_edit">Status:</label>
        <select name="status_edit" id="status_edit">
            <option value="pending">Pending</option>
            <option value="in progress">In progress</option>
            <option value="completed">Completed</option>
        </select>
        <br><br>

        <button type="submit">Edit task</button>
    </form>

    <h2>Delete task</h2>
    <!--Form delete task-->
    <form id="form_delete_task">
        <label for="task_id_delete">Task ID:</label>
        <input type="number" id="task_id_delete" name="task_id_delete" placeholder="1" required>
        <br><br>

        <button type="submit">Delete task</button>
    </form>
</body>
</html>
